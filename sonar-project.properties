# Project Key

```properties
sonar.projectKey=roboshop-catalogue
```

Unique identifier inside SonarQube.

Purpose:

```text
Project Identification
```

Example:

```text
roboshop-catalogue
```

SonarQube stores analysis results under this key.

---

# Why Project Key Matters?

Without a unique key:

```text
Analysis Cannot Be Stored
```

SonarQube uses it as:

```text
Primary Identifier
```

for the project.

---

# Project Name

```properties
sonar.projectName="roboshop catalogue"
```

Human-readable project name.

Displayed in:

```text
SonarQube Dashboard
```

Example:

```text
roboshop catalogue
```

---

# Difference Between Key and Name

## Project Key

```properties
sonar.projectKey
```

Purpose:

```text
Internal Identifier
```

Example:

```text
roboshop-catalogue
```

---

## Project Name

```properties
sonar.projectName
```

Purpose:

```text
Display Name
```

Example:

```text
roboshop catalogue
```

---

# Source Code Location

```properties
sonar.sources=.
```

Specifies where source code exists.

Current Value:

```text
.
```

Meaning:

```text
Current Directory
```

SonarQube scans:

```text
All Files
```

unless excluded.

---

# Example Structure

```text
project/
│
├── server.js
├── package.json
├── Dockerfile
├── Jenkinsfile
├── coverage/
├── node_modules/
└── tests/
```

Sonar starts scanning from:

```text
project/
```

---

# Exclusions

```properties
sonar.exclusions=
```

Defines files Sonar should ignore.

Purpose:

```text
Reduce Noise

Improve Accuracy

Faster Analysis
```

---

# Jenkinsfile Exclusion

```properties
Jenkinsfile
```

Ignored because:

```text
Pipeline Code

Not Application Logic
```

---

# Dockerfile Exclusion

```properties
Dockerfile
```

Ignored because:

```text
Infrastructure Code

Not Business Logic
```

---

# Database Scripts Exclusion

```properties
**/db/**
```

Excludes:

```text
db/
db/init/
db/scripts/
```

Purpose:

```text
Ignore Seed Data

Ignore Database Scripts
```

---

# node_modules Exclusion

```properties
**/node_modules/**
```

Very important.

Without exclusion:

```text
Thousands of Third-Party Files
```

would be scanned.

Problems:

```text
Slow Analysis

Incorrect Results

Huge Reports
```

---

# Coverage Folder Exclusion

```properties
coverage/**
```

Coverage reports are generated files.

Should not be analyzed.

Example:

```text
coverage/lcov.info
```

---

# Mock Folder Exclusion

```properties
__mocks__/**
```

Contains:

```text
Fake Test Data

Mock Services

Mock MongoDB
```

Purpose:

```text
Testing Only
```

Not production code.

---

# Test File Exclusion

```properties
**/*.test.js
```

Examples:

```text
server.test.js

user.test.js

cart.test.js
```

Excluded from:

```text
Source Code Analysis
```

because they are test files.

---

# Source Analysis Result

After exclusions Sonar analyzes:

```text
server.js

routes/

controllers/

services/
```

Production code only.

---

# Test Directory

```properties
sonar.tests=.
```

Specifies where tests exist.

Current Value:

```text
Current Directory
```

Sonar searches recursively.

---

# Test Inclusion

```properties
sonar.test.inclusions=**/*.test.js
```

Identifies test files.

Examples:

```text
server.test.js

cart.test.js

user.test.js
```

These files are treated as:

```text
Unit Tests
```

instead of source code.

---

# Why Separate Source and Tests?

Without separation:

```text
Coverage Calculation Incorrect
```

Sonar needs to know:

```text
Production Code

vs

Test Code
```

---

