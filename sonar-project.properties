# SonarQube Configuration File (sonar-project.properties)

This file configures how SonarQube analyzes the Roboshop Catalogue application.

The configuration tells SonarQube:

- Project Identification
- Source Code Location
- Test File Location
- Files to Exclude
- Coverage Report Location
- JavaScript Analysis Settings

This file is typically used by:

```bash
sonar-scanner
```

during CI/CD pipelines.

---

# Complete Configuration

```properties
sonar.projectKey=roboshop-catalogue

sonar.projectName="roboshop catalogue"

sonar.sources=.

sonar.exclusions=Jenkinsfile,Dockerfile,**/db/**,**/node_modules/**,coverage/**,__mocks__/**,**/*.test.js

sonar.tests=.

sonar.test.inclusions=**/*.test.js

sonar.javascript.lcov.reportPaths=coverage/lcov.info
```

---

